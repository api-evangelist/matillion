  humanURL: https://docs.matillion.com
  baseURL: https://eu1.api.matillion.com/dpc
  properties:
  - url: https://docs.matillion.com
    type: Documentation
  - url: openapi/matillion-openapi.yml
    type: OpenAPI
  description: Launch pipeline executions, list executions for a project, retrieve
    execution status and step detail, and cancel a running execution (PATCH status
    CANCELLED). Long-running execution is observed by polling the status endpoint,
    not by a push transport.
