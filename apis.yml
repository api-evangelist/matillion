aid: matillion
url: https://raw.githubusercontent.com/api-evangelist/matillion/refs/heads/main/apis.yml
name: Matillion
kind: company
description: Matillion is a data integration and transformation (ETL/ELT) company whose
  Data Productivity Cloud (DPC) lets teams build, orchestrate, and schedule data pipelines
  against cloud data warehouses. The DPC API is an OAuth2-secured REST control plane
  for projects, environments, pipeline executions, schedules, and Agents, while the
  legacy instance-hosted Matillion ETL API exposes groups, projects, versions, jobs,
  tasks, and schedules over HTTP Basic auth.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Data Integration
- ETL
- ELT
- Data Pipelines
- Cloud Data Warehouse
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
apis:
- aid: matillion:dpc-projects
  name: DPC Projects
  tags:
  - Projects
  - Data Productivity Cloud
  - Control Plane
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.matillion.com
  baseURL: https://eu1.api.matillion.com/dpc
  properties:
  - url: https://docs.matillion.com
    type: Documentation
  - url: openapi/matillion-openapi.yml
    type: OpenAPI
  description: List, create, and delete Data Productivity Cloud projects via the regional
    DPC control plane (eu1.api.matillion.com/dpc or us1.api.matillion.com/dpc), secured
    with an OAuth2 client-credentials Bearer JWT. Branches are managed in the UI only
    and are not exposed as a public API.
- aid: matillion:dpc-environments
  name: DPC Environments
  tags:
  - Environments
  - Data Productivity Cloud
  - Warehouse Connections
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.matillion.com
  baseURL: https://eu1.api.matillion.com/dpc
  properties:
  - url: https://docs.matillion.com
    type: Documentation
  - url: openapi/matillion-openapi.yml
    type: OpenAPI
  description: List and create the environments (warehouse connection contexts) that
    belong to a Data Productivity Cloud project, on the OAuth2-secured DPC control
    plane.
- aid: matillion:dpc-pipeline-executions
  name: DPC Pipeline Executions
  tags:
  - Pipeline Executions
  - Data Productivity Cloud
