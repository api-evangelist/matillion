description: >-
  FinOps view of Matillion Data Productivity Cloud spend. Matillion bills a
  credit-based, consumption model: pipeline orchestration and transformation
  runs, data movement, and AI-assisted features draw credits from a plan
  allotment, with per-credit overage above the included bundle. Legacy
  Matillion ETL was billed as marketplace instance-hours (AWS / Azure / GCP) or
  annual license. Note that Matillion credits are separate from — and additive
  to — the compute cost of the underlying cloud data warehouse (Snowflake,
  Databricks, Redshift, BigQuery, Synapse) that Matillion pushes work down into.
notes: >-
  Credit inclusions and per-credit rates change; verify against the current
  Matillion pricing page during reconciliation. Total cost of ownership must
  account for both Matillion credits and the downstream warehouse compute the
  pipelines consume.
