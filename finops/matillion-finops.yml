meters:
- name: credits_consumed
  description: Platform credits consumed running pipelines, orchestration, and transformations, drawn from the plan allotment.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - project
  - environment
  - pipeline
- name: included_credits
  description: Monthly credit allotment included with the subscribed plan.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: overage_credits
  description: Credits consumed beyond the included allotment, billed at the per-credit overage rate.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: pipeline_executions
  description: Count of pipeline executions (runs) launched via schedule, trigger, or API.
  unit: executions
  aggregation: sum
  dimensions:
  - account
  - project
  - pipeline
- name: etl_instance_hours
  description: Legacy Matillion ETL marketplace instance-hours (AWS / Azure / GCP), billed by instance size.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - cloud
  - instance_size
principles:
- name: Visibility
  description: Track credit consumption per project, environment, and pipeline in the Data Productivity Cloud usage views; correlate with downstream warehouse spend.
- name: Allocation
  description: Map projects and environments to teams and cost centers so credit burn is attributable.
- name: Optimization
  description: Push heavy transformation down to the warehouse (ELT), consolidate redundant pipeline runs, tune schedules to avoid idle re-runs, and right-size the plan to actual credit usage.
- name: Accountability
  description: Assign owners per project; review monthly credit consumption and overage against the plan allotment and downstream warehouse cost.
